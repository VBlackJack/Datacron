name: ci

on:
  push:
    branches: [main, "claude-code/**", "codex/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: Invariant gate (Py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install ripgrep (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install ripgrep (Windows)
        if: runner.os == 'Windows'
        run: choco install ripgrep --no-progress -y

      - name: Install project
        run: |
          python -m pip install uv==0.11.3
          uv sync --frozen --extra dev --python "${{ matrix.python-version }}"

      - name: Blocking invariant gate
        run: uv run --frozen --extra dev python scripts/check_invariants.py

      - name: Full regression suite with coverage
        run: uv run --frozen --extra dev pytest --cov=datacron --cov-report=term-missing

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No shell scripts to check
        if: hashFiles('scripts/**/*.sh') == ''
        run: echo "No shell scripts found under scripts/."
      - name: Run ShellCheck
        if: hashFiles('scripts/**/*.sh') != ''
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: ./scripts
          ignore_paths: ""
