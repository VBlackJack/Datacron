name: publish-pypi

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify invariant and regression gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install project and verification dependencies
        run: |
          python -m pip install uv==0.11.3
          uv sync --frozen --extra dev --extra build

      - name: Blocking invariant gate
        run: uv run --frozen --extra dev --extra build python scripts/check_invariants.py

      - name: Full regression suite
        run: uv run --frozen --extra dev --extra build pytest

  build-dist:
    name: Build Python distributions
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv==0.11.3

      - name: Build distributions
        run: uv build

      - name: Check distribution metadata
        run: uvx --from twine twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: pypi-distributions
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build-dist
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7
        with:
          name: pypi-distributions
          path: dist

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1 (v1.14.0)
        with:
          packages-dir: dist/

  publish-mcp-registry:
    name: Publish server metadata to the MCP Registry
    needs: publish-pypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      MCP_SERVER_JSON_PATH: server.json
      MCP_SERVER_NAME: io.github.VBlackJack/datacron
      PYPI_PACKAGE: datacron
      PYPI_API_BASE_URL: https://pypi.org/pypi
      MCP_REGISTRY_API_BASE_URL: https://registry.modelcontextprotocol.io
      MCP_PUBLISHER_DOWNLOAD_BASE_URL: https://github.com/modelcontextprotocol/registry/releases/download
      # Pinned official release and published SHA-256 for the Linux AMD64 asset.
      MCP_PUBLISHER_VERSION: v1.8.0
      MCP_PUBLISHER_ASSET: mcp-publisher_linux_amd64.tar.gz
      MCP_PUBLISHER_SHA256: 1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf
      # Bound PyPI propagation checks to about two minutes plus request time.
      MCP_PYPI_POLL_ATTEMPTS: "12"
      MCP_PYPI_POLL_INTERVAL_SECONDS: "10"
      MCP_CURL_CONNECT_TIMEOUT_SECONDS: "10"
      MCP_CURL_MAX_TIME_SECONDS: "30"
      MCP_DOWNLOAD_MAX_TIME_SECONDS: "120"
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Publish committed server.json after PyPI
        run: bash scripts/mcp_registry_publish.sh
